<div class="flex items-center gap-3 py-2 px-4 cursor-pointer text-sm text-[var(--color-text-primary)] transition-colors w-full group hover:bg-[var(--color-surface-raised)]"
    (click)="navigate()" (keyup.enter)="navigate()" tabindex="0" role="button">
    <div class="relative flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-subtle group-hover:text-[var(--color-text-primary)]">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
        @if (notificationService.unreadCount() > 0) {
            <span class="absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full flex items-center justify-center text-[9px] font-bold text-white"
                style="background-color: var(--color-primary)">
                {{ notificationService.unreadCount() > 9 ? '9+' : notificationService.unreadCount() }}
            </span>
        }
    </div>
    <span class="group-hover:underline underline-offset-4 decoration-1 decoration-[var(--color-border)] font-medium">Notificaciones</span>
    @if (notificationService.unreadCount() > 0) {
        <span class="ml-auto badge badge-error text-xs">{{ notificationService.unreadCount() }}</span>
    }
</div>
