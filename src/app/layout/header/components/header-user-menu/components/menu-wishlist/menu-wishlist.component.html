<a routerLink="/account/wishlist"
    class="flex items-center gap-3 py-2 px-4 text-sm transition-colors w-full group hover:bg-[var(--color-surface-raised)]"
    style="color: var(--color-text-primary)">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        class="flex-shrink-0" style="color: var(--color-text-muted)">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
    <span class="font-medium flex-1">Mis Favoritos</span>
    @if (count() > 0) {
        <span class="badge badge-accent text-[10px] px-1.5 py-0.5">{{ count() }}</span>
    }
</a>
