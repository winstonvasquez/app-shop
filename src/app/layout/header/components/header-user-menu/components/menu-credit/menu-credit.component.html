<a routerLink="/account/credit"
    class="flex items-center gap-3 py-2 text-sm transition-colors w-full group"
    style="color: var(--color-text-primary)">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        style="color: var(--color-text-muted)">
        <rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/>
    </svg>
    <span class="font-medium">Saldo de crédito</span>
    @if (creditService.balance(); as bal) {
        @if (bal.balance > 0) {
            <span class="ml-auto text-xs font-bold px-1.5 py-0.5 rounded-full"
                style="background: var(--color-primary); color: white">
                S/ {{ bal.balance | number:'1.2-2' }}
            </span>
        }
    }
</a>
