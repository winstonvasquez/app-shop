<div class="flex items-center gap-3 py-2 px-4 cursor-pointer text-sm text-[var(--color-text-primary)] transition-colors w-full group hover:bg-[var(--color-surface-raised)]"
    (click)="goToOrders()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-subtle group-hover:text-[var(--color-text-primary)] flex-shrink-0">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>
    </svg>
    <span class="group-hover:underline underline-offset-4 decoration-1 decoration-[var(--color-border)] font-medium flex-1">Tus pedidos</span>
    @if (loading()) {
        <span class="text-xs text-[var(--color-text-muted)]">...</span>
    } @else if (recentOrders().length > 0) {
        <span class="text-xs bg-[var(--color-primary)] text-on-primary rounded-full px-1.5 py-0.5 font-bold">{{ recentOrders().length }}</span>
    }
</div>
