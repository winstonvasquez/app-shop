<div
    class="bg-[var(--color-secondary)] text-[var(--color-text-primary)] py-4 relative z-50 shadow-md w-full border-b border-[var(--color-border)]">
    <div class="w-full max-w-[1200px] mx-auto flex items-center justify-between gap-4 px-4 md:px-8">

        <!-- Logo -->
        <a routerLink="/" class="flex-shrink-0 flex flex-col items-center leading-none">
            <div class="text-3xl font-black tracking-tighter font-display">APP <span
                    class="text-[var(--color-primary)]">SHOP</span></div>
            <span class="text-[10px] uppercase tracking-[0.25em] text-white/70">{{ saveMore() }}</span>
        </a>

        <!-- Search Bar — Priority Centered -->
        <div class="flex-1 flex justify-center px-4">
            <app-header-search-dropdown class="w-full max-w-[650px]"></app-header-search-dropdown>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-6 flex-shrink-0">
            <div class="relative" (mouseleave)="closeUserMenu()">
                <!-- User Trigger -->
                <div class="flex items-center gap-2 cursor-pointer hover:opacity-90 py-[6px]"
                    (click)="handleUserMenuClick()">
                    <div class="bg-white/15 p-1.5 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="text-xs hidden lg:block leading-tight">
                        <div>{{ helloLabel() }}, {{ userName() }}</div>
                        <div class="font-bold">{{ ordersLabel() }}</div>
                    </div>
                </div>
                <!-- Dropdown Menú -->
                @if (isAuthenticated()) {
                <app-header-user-menu [isOpen]="isUserMenuOpen()"></app-header-user-menu>
                }
            </div>

            <div class="cursor-pointer hover:scale-105 active:scale-95 transition-all relative p-1 mt-1" tabindex="0"
                (click)="toggleDrawer()" (keyup.enter)="toggleDrawer()">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="21" r="1.5" />
                    <circle cx="19" cy="21" r="1.5" />
                    <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
                </svg>
                <span
                    class="absolute -top-1.5 -right-2 bg-[var(--color-primary)] text-white text-[11px] font-black px-1.5 py-[1px] rounded-full shadow-sm border-[1.5px] border-[var(--color-secondary)] min-w-[20px] text-center">{{
                    cartCount() > 9 ? '9+' : cartCount() }}</span>
            </div>
        </div>
    </div>

    <!-- Mobile Search (visible only on mobile) -->
    <div class="container mx-auto px-4 mt-3 md:hidden max-w-[1200px]">
        <app-header-search-dropdown class="w-full"></app-header-search-dropdown>
    </div>

    <!-- Secondary Nav -->
    <div
        class="container mx-auto px-4 mt-2 hidden md:flex items-center justify-center gap-6 text-sm font-medium max-w-[1200px]">
        <div class="flex items-center gap-1 cursor-pointer hover:opacity-80">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
                class="text-accent">
                <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
            </svg>
            {{ bestSellers() }}
        </div>
        <div class="flex items-center gap-1 cursor-pointer hover:opacity-80">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
                class="text-accent">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
            </svg>
            {{ fiveStars() }}
        </div>
        <div class="hover:opacity-80 cursor-pointer">{{ whatsNew() }}</div>
        <div class="flex items-center gap-1 hover:opacity-80 cursor-pointer">
            {{ categories() }}
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6" />
            </svg>
        </div>
    </div>

</div>
