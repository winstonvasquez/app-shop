<div class="min-h-screen flex flex-col" style="background: var(--c-bg, var(--color-background));">

    <ds-top-bar/>

    <div class="header-with-mega" (mouseleave)="onLeaveCategoryArea()">
        <ds-shop-header
            [cartCount]="cartCount()"
            [isAuthenticated]="isAuthenticated()"
            [userName]="userName()"
            [categories]="headerCategories()"
            (userClick)="onUserClick()"
            (cartClick)="onCartClick()"
            (search)="onSearch($event)"
            (categorySelect)="onCategorySelect($event)"
            (openCategoryMenu)="onOpenCategoryMenu()"
            (hoverCategoryMenu)="onHoverCategoryMenu()"/>

        <div class="mega-anchor" (mouseenter)="onEnterMegaPanel()">
            <app-category-mega-menu #megaMenu [showTrigger]="false"/>
        </div>
    </div>

    <app-flash-sale-banner/>

    <main class="flex-grow" style="width: 90%; margin: 0 auto;">
        <router-outlet/>
    </main>

    <ds-shop-footer/>

    <app-floating-menu/>
    <app-floating-chat/>
    <app-cart-drawer/>
    <app-product-quickview/>
</div>

<app-auth-modal
    [isOpen]="modalState.isAuthModalOpen()"
    (close)="modalState.closeAuthModal()"
    (loginSuccess)="onAuthModalLoginSuccess()"/>

<app-toast-container/>
