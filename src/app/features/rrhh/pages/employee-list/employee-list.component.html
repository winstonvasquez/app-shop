<app-page-header
    title="Empleados"
    subtitle="Gestión del personal de la empresa"
    [breadcrumbs]="breadcrumbs">
    <div actions>
        <app-button icon="plus" label="Nuevo Empleado" variant="primary" (click)="openCreateModal()" />
    </div>
</app-page-header>

@if (error()) {
    <app-alert type="error" [message]="error()!" />
}

<!-- Filtros -->
<div class="filters-bar">
    <div class="search-box">
        <svg class="search-box-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
        </svg>
        <input
            type="text"
            placeholder="Buscar por código, nombre o documento..."
            [value]="searchQuery()"
            (input)="onSearch($event)" />
    </div>

    <select class="form-input" style="width: auto; min-width: 160px"
            [value]="filterEstado()"
            (change)="onFilterEstado($event)">
        <option value="">Todos los estados</option>
        <option value="ACTIVO">Activo</option>
        <option value="INACTIVO">Inactivo</option>
        <option value="SUSPENDIDO">Suspendido</option>
        <option value="CESADO">Cesado</option>
    </select>
</div>

<!-- Tabla -->
<app-data-table
    [data]="pagedData()"
    [columns]="columns"
    [actions]="actions"
    [loading]="loading()"
    [exportable]="true"
    exportFileName="empleados"
    [hidePagination]="true" />

<!-- Paginación -->
@if (totalElements() > 0) {
    <app-pagination
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [totalElements]="totalElements()"
        [pageSize]="pageSize()"
        (pageChange)="onPaginationChange($event)" />
}

<!-- ── Drawer: Crear / Editar Empleado ────────────────────────────────── -->
<app-drawer
    [isOpen]="showModal()"
    [title]="editMode() ? 'Editar Empleado' : 'Nuevo Empleado'"
    size="lg"
    [hasFooter]="true"
    (closed)="closeModal()">

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

        @if (submitError()) {
            <app-alert type="error" [message]="submitError()!" />
        }

        <app-admin-form-section title="Datos Personales" [columns]="2">
            <app-form-field
                label="Código Empleado"
                [control]="getControl('codigoEmpleado')"
                placeholder="Ej: E001"
                [required]="true" />

            <app-form-field
                label="DNI / Documento"
                [control]="getControl('documentoIdentidad')"
                placeholder="Ej: 12345678"
                [required]="true" />

            <app-form-field
                label="Nombres"
                [control]="getControl('nombres')"
                placeholder="Nombres del empleado"
                [required]="true" />

            <app-form-field
                label="Apellidos"
                [control]="getControl('apellidos')"
                placeholder="Apellidos del empleado"
                [required]="true" />

            <div class="form-group-2col-span">
                <app-date-input
                    label="Fecha de Ingreso"
                    [required]="true"
                    formControlName="fechaIngreso" />
            </div>
        </app-admin-form-section>

        <app-admin-form-section title="Información Laboral" [columns]="2">
            <app-form-field
                label="Cargo"
                [control]="getControl('cargo')"
                placeholder="Ej: Contador" />

            <app-form-field
                label="Área"
                [control]="getControl('area')"
                placeholder="Ej: Contabilidad" />

            <div>
                <label class="input-label">Estado</label>
                <select class="form-input" formControlName="estado">
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                    <option value="SUSPENDIDO">Suspendido</option>
                    <option value="CESADO">Cesado</option>
                </select>
            </div>
        </app-admin-form-section>

        <app-admin-form-section title="Contacto" [columns]="2">
            <app-form-field
                label="Email"
                [control]="getControl('email')"
                type="email"
                placeholder="correo@empresa.com" />

            <app-form-field
                label="Teléfono"
                [control]="getControl('telefono')"
                type="tel"
                placeholder="Ej: 987654321" />
        </app-admin-form-section>

    </form>

    <!-- Footer del Drawer -->
    <div slot="footer" class="form-actions">
        <app-button icon="x" label="Cancelar" variant="secondary" type="button" (click)="closeModal()" />
        <!-- btn-migration: SKIP — label dinámico con ternario (submitting/editMode) -->
        <button class="btn btn-primary" type="button"
                [disabled]="submitting()"
                (click)="onSubmit()">
            {{ submitting() ? 'Guardando...' : (editMode() ? 'Actualizar' : 'Crear Empleado') }}
        </button>
    </div>

</app-drawer>
