<app-page-header
    title="Registro de Asistencia"
    subtitle="Control de marcaciones diarias del personal"
    [breadcrumbs]="breadcrumbs">
    <div actions>
        <app-button label="Registrar Asistencia" icon="plus" variant="primary" (click)="openCreateModal()" />
    </div>
</app-page-header>

@if (error()) {
    <app-alert type="error" [message]="error()!" />
}

<!-- Filtros -->
<div class="filters-bar">
    <div class="flex items-center gap-2">
        <label class="input-label" style="margin: 0; white-space: nowrap">Fecha:</label>
        <input
            type="date"
            class="form-input"
            style="width: 180px"
            [value]="filterFecha()"
            (change)="onFilterFecha($event)" />
    </div>

    <select class="form-input" style="width: auto; min-width: 170px"
            [value]="filterTipo()"
            (change)="onFilterTipo($event)">
        <option value="">Todos los tipos</option>
        @for (opt of tipoRegistroOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
        }
    </select>
</div>

<!-- Tabla -->
<app-data-table
    [data]="pagedData()"
    [columns]="columns"
    [loading]="loading()"
    [exportable]="true"
    exportFileName="asistencia"
    [hidePagination]="true" />

<!-- Paginación -->
@if (totalElements() > 0) {
    <app-pagination
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [totalElements]="totalElements()"
        [pageSize]="pageSize()"
        (pageChange)="onPaginationChange($event)" />
}

<!-- ── Drawer: Registrar Asistencia ───────────────────────────────────── -->
<app-drawer
    [isOpen]="showModal()"
    title="Registrar Asistencia"
    size="md"
    [hasFooter]="true"
    (closed)="closeModal()">

    <form [formGroup]="attendanceForm" (ngSubmit)="onSubmit()">

        @if (submitError()) {
            <app-alert type="error" [message]="submitError()!" />
        }

        <p class="text-subtle text-sm font-semibold mb-2 mt-1">Datos de la Marcación</p>
        <hr style="border-color: var(--color-border); margin-bottom: var(--space-md)">

        <!-- Empleado -->
        <div style="margin-bottom: var(--space-md)">
            <label class="input-label">
                Empleado <span style="color: var(--color-error)">*</span>
            </label>
            <select class="form-input" formControlName="employeeId">
                <option [ngValue]="null">— Seleccione un empleado —</option>
                @for (emp of employees(); track emp.id) {
                    <option [ngValue]="emp.id">
                        {{ emp.codigoEmpleado }} — {{ emp.nombres }} {{ emp.apellidos }}
                    </option>
                }
            </select>
            @if (getControl('employeeId').invalid && getControl('employeeId').touched) {
                <span class="input-error-message">Seleccione un empleado</span>
            }
        </div>

        <!-- Fecha -->
        <div style="margin-bottom: var(--space-md)">
            <app-date-input
                label="Fecha"
                [required]="true"
                formControlName="fecha" />
        </div>

        <!-- Horas -->
        <app-admin-form-section [columns]="2">
            <div>
                <label class="input-label">Hora Entrada</label>
                <input type="time" class="form-input" formControlName="horaEntrada" />
            </div>
            <div>
                <label class="input-label">Hora Salida</label>
                <input type="time" class="form-input" formControlName="horaSalida" />
            </div>
        </app-admin-form-section>

        <!-- Tipo de registro -->
        <div style="margin-bottom: var(--space-md)">
            <label class="input-label">
                Tipo de Registro <span style="color: var(--color-error)">*</span>
            </label>
            <select class="form-input" formControlName="tipoRegistro">
                @for (opt of tipoRegistroOptions; track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                }
            </select>
        </div>

        <!-- Observaciones -->
        <div>
            <label class="input-label">Observaciones</label>
            <textarea
                class="form-input"
                rows="3"
                placeholder="Observaciones adicionales..."
                formControlName="observaciones"
                style="resize: vertical"></textarea>
        </div>

    </form>

    <div slot="footer" class="form-actions">
        <app-button label="Cancelar" icon="x" variant="secondary" type="button" (click)="closeModal()" />
        <!-- btn-migration: SKIP — label condicional multi-línea (submitting ? 'Registrando...' : 'Registrar') -->
        <button class="btn btn-primary" type="button"
                [disabled]="submitting()"
                (click)="onSubmit()">
            {{ submitting() ? 'Registrando...' : 'Registrar' }}
        </button>
    </div>

</app-drawer>
