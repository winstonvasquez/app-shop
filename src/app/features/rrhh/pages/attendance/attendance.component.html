<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Registro de Asistencia</h1>
      <p class="page-subtitle">Control de marcaciones diarias del personal</p>
    </div>
  </div>

  @if (message()) {
    <div style="padding:12px 16px;border-radius:8px;margin-bottom:var(--space-md);font-size:0.875rem;font-weight:500"
         [style.background]="messageType() === 'success' ? 'color-mix(in oklch, var(--color-success) 15%, transparent)' : 'color-mix(in oklch, var(--color-error) 15%, transparent)'"
         [style.color]="messageType() === 'success' ? 'var(--color-success)' : 'var(--color-error)'"
         [style.border]="messageType() === 'success' ? '1px solid color-mix(in oklch, var(--color-success) 30%, transparent)' : '1px solid color-mix(in oklch, var(--color-error) 30%, transparent)'">
      {{ message() }}
    </div>
  }

  <div style="display:grid;grid-template-columns:360px 1fr;gap:var(--space-md);align-items:start">

    <!-- Formulario -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Nueva Marcación</h3>
      </div>
      <div class="card-body">
        <form [formGroup]="attendanceForm" (ngSubmit)="onSubmit()" style="display:flex;flex-direction:column;gap:14px">

          <div>
            <label class="input-label" for="employeeId">Empleado *</label>
            <select id="employeeId" class="input-field" formControlName="employeeId">
              <option value="">Seleccione un empleado</option>
              @for (emp of employees(); track emp.id) {
                <option [value]="emp.id">{{ emp.codigoEmpleado }} - {{ emp.nombres }} {{ emp.apellidos }}</option>
              }
            </select>
          </div>

          <div>
            <label class="input-label" for="fecha">Fecha *</label>
            <input id="fecha" type="date" class="input-field" formControlName="fecha">
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <label class="input-label" for="horaEntrada">Hora Entrada</label>
              <input id="horaEntrada" type="time" class="input-field" formControlName="horaEntrada">
            </div>
            <div>
              <label class="input-label" for="horaSalida">Hora Salida</label>
              <input id="horaSalida" type="time" class="input-field" formControlName="horaSalida">
            </div>
          </div>

          <div>
            <label class="input-label" for="tipoRegistro">Tipo de Registro *</label>
            <select id="tipoRegistro" class="input-field" formControlName="tipoRegistro">
              @for (opt of tipoRegistroOptions; track opt.value) {
                <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>

          <div>
            <label class="input-label" for="observaciones">Observaciones</label>
            <textarea id="observaciones" class="input-field" formControlName="observaciones"
                      rows="3" style="resize:vertical"></textarea>
          </div>

          <button class="btn btn-primary" type="submit"
                  [disabled]="attendanceForm.invalid || loading()">
            @if (loading()) {
              Registrando...
            } @else {
              Registrar Asistencia
            }
          </button>

        </form>
      </div>
    </div>

    <!-- Tabla registros del día -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Registros de Hoy</h3>
        <span class="badge badge-neutral">{{ attendances().length }} registros</span>
      </div>
      <app-data-table
        [data]="attendances()"
        [columns]="columns"
        [loading]="loading()"
        [totalPages]="1"
        [totalElements]="attendances().length"
        [currentPage]="0"
        [pageSize]="100"
        [exportable]="true"
        exportFileName="asistencia">
      </app-data-table>
    </div>

  </div>
</div>
