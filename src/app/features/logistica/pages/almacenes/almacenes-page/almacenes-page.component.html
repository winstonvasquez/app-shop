<div class="page-container">
  <app-page-header
    title="Almacenes"
    subtitle="Gestión de almacenes y ubicaciones de stock"
    [breadcrumbs]="breadcrumbs">
    <div actions>
      <button class="btn btn-primary" (click)="openCreateForm()">+ Nuevo Almacén</button>
    </div>
  </app-page-header>

  @if (error()) {
    <app-alert type="error" [message]="error()!" (dismiss)="error.set(null)" [dismissible]="true" />
  }

  <app-data-table
    [data]="almacenes()"
    [columns]="columns"
    [actions]="actions"
    [loading]="loading()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [totalElements]="totalElements()"
    [totalPages]="totalPages()"
    [searchable]="true"
    searchPlaceholder="Buscar almacén..."
    [exportable]="true"
    exportFileName="almacenes-export"
    (pageChange)="onPaginationChange($event)">
  </app-data-table>
</div>

<!-- Drawer Formulario Almacén -->
<app-drawer
  [isOpen]="showForm()"
  [title]="editMode() ? 'Editar Almacén' : 'Nuevo Almacén'"
  size="lg"
  side="right"
  [hasFooter]="true"
  (closed)="closeForm()">

  <form [formGroup]="form">
    <div class="form-grid">
      <div class="form-field-wrapper">
        <label class="input-label">Código *</label>
        <input class="input-field" type="text" formControlName="codigo"
               placeholder="ALM1, CNTRL, etc.">
        @if (form.get('codigo')?.invalid && form.get('codigo')?.touched) {
          <span class="input-error-message">Código requerido</span>
        }
      </div>

      <div class="form-field-wrapper">
        <label class="input-label">Nombre *</label>
        <input class="input-field" type="text" formControlName="nombre"
               placeholder="Almacén Principal">
        @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
          <span class="input-error-message">Nombre requerido</span>
        }
      </div>

      <div class="form-field-wrapper" style="grid-column:1/-1">
        <label class="input-label">Dirección</label>
        <input class="input-field" type="text" formControlName="direccion"
               placeholder="Av. Industrial 123, Lima">
      </div>

      <div class="form-field-wrapper">
        <label class="input-label">Teléfono</label>
        <input class="input-field" type="tel" formControlName="telefono"
               placeholder="01-234-5678">
      </div>
    </div>
  </form>

  @if (submitError()) {
    <app-alert type="error" [message]="submitError()!" />
  }

  <div slot="footer">
    <button class="btn btn-secondary" (click)="closeForm()">Cancelar</button>
    <button class="btn btn-primary" (click)="onSubmit()" [disabled]="submitting()">
      {{ submitting() ? 'Guardando...' : (editMode() ? 'Actualizar' : 'Crear') }}
    </button>
  </div>
</app-drawer>
