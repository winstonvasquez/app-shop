<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Gestión de Pagos</h1>
      <p class="page-subtitle">Aprobación y seguimiento de pagos a beneficiarios</p>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" (click)="showModal.set(true)">+ Registrar Pago</button>
    </div>
  </div>

  <!-- KPIs -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--space-md);margin-bottom:var(--space-lg)">
    <div class="card">
      <div class="card-body">
        <div style="color:var(--color-text-muted);font-size:0.875rem">Pendientes</div>
        <div style="font-size:2.5rem;font-weight:700"
             [style.color]="countPendientes() > 0 ? 'var(--color-warning)' : 'var(--color-text-muted)'">
          {{ countPendientes() }}
        </div>
        <div style="color:var(--color-text-muted);font-size:0.75rem">por aprobar</div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div style="color:var(--color-text-muted);font-size:0.875rem">Aprobados</div>
        <div style="font-size:2.5rem;font-weight:700;color:var(--color-accent)">{{ countAprobados() }}</div>
        <div style="color:var(--color-text-muted);font-size:0.75rem">listos para pagar</div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div style="color:var(--color-text-muted);font-size:0.875rem">Pagados</div>
        <div style="font-size:2.5rem;font-weight:700;color:var(--color-success)">{{ countPagados() }}</div>
        <div style="color:var(--color-text-muted);font-size:0.75rem">completados</div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div style="color:var(--color-text-muted);font-size:0.875rem">Total comprometido</div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--color-primary)">
          S/ {{ totalPendiente() | number:'1.2-2' }}
        </div>
        <div style="color:var(--color-text-muted);font-size:0.75rem">pendientes + aprobados</div>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filters-bar" style="margin-bottom:var(--space-md)">
    <div class="search-box" style="flex:unset">
      <select class="input-field" [value]="filtroEstado()" (change)="filtroEstado.set($any($event.target).value)"
              style="min-width:160px">
        <option value="">Todos los estados</option>
        @for (opt of estadoOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div class="search-box" style="flex:unset">
      <select class="input-field" [value]="filtroTipo()" (change)="filtroTipo.set($any($event.target).value)"
              style="min-width:160px">
        <option value="">Todos los tipos</option>
        @for (opt of tipoPagoOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
  </div>

  <app-data-table
    [data]="pagosFiltrados()"
    [columns]="columns"
    [actions]="actions"
    [loading]="cargando()"
    [totalPages]="1"
    [totalElements]="pagosFiltrados().length"
    [currentPage]="0"
    [pageSize]="100"
    [exportable]="true"
    exportFileName="pagos">
  </app-data-table>

</div>

<app-drawer
  [isOpen]="showModal()"
  title="Registrar Nuevo Pago"
  size="md"
  side="right"
  [hasFooter]="true"
  (closed)="showModal.set(false)">

  <div style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label class="input-label">Tipo de Pago *</label>
      <select class="input-field" [(ngModel)]="formTipo">
        @for (opt of tipoPagoOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div>
      <label class="input-label">Beneficiario *</label>
      <input class="input-field" [(ngModel)]="formBeneficiario"
             placeholder="Nombre del beneficiario">
    </div>
    <div>
      <label class="input-label">Concepto *</label>
      <input class="input-field" [(ngModel)]="formConcepto"
             placeholder="Descripción del pago">
    </div>
    <div>
      <label class="input-label">Monto (S/) *</label>
      <input class="input-field" type="number" [(ngModel)]="formMonto"
             min="0.01" step="0.01" placeholder="0.00">
    </div>
  </div>

  <div slot="footer">
    <button class="btn btn-secondary" (click)="showModal.set(false)">Cancelar</button>
    <button class="btn btn-primary" (click)="registrarPago()"
            [disabled]="guardando() || !formBeneficiario || formMonto <= 0">
      {{ guardando() ? 'Guardando...' : 'Registrar Pago' }}
    </button>
  </div>
</app-drawer>
