<div class="page-container">

    <!-- Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Promociones</h1>
            <p class="page-subtitle">Campañas, descuentos y cupones para tus clientes</p>
        </div>
        <button class="btn btn-primary" (click)="abrirNueva()">+ Nueva Promoción</button>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 gap-[var(--card-gap)] sm:grid-cols-3 mb-[var(--section-gap)]">
        <div class="card-metric">
            <span class="card-metric-label">Activas</span>
            <span class="card-metric-value text-[var(--color-success)]">{{ totalActivas() }}</span>
        </div>
        <div class="card-metric">
            <span class="card-metric-label">Próximas a Vencer (7d)</span>
            <span class="card-metric-value text-[var(--color-warning)]">{{ proximasAVencer() }}</span>
        </div>
        <div class="card-metric">
            <span class="card-metric-label">Vencidas</span>
            <span class="card-metric-value text-[var(--color-text-muted)]">{{ totalVencidas() }}</span>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filters-bar mb-[var(--form-gap)]">
        <select class="form-input" [value]="filtroEstado" (change)="filtroEstado = $any($event.target).value">
            @for (opt of estadoOptions; track opt.value) {
                <option [value]="opt.value">{{ opt.label }}</option>
            }
        </select>
    </div>

    <!-- Tabla -->
    <div class="card">
        <div class="card-body" style="padding:0">
            <app-data-table
                [data]="promocionesVm()"
                [columns]="columns"
                [actions]="actions"
                [loading]="cargando()"
                [totalElements]="promocionesVm().length"
                [pageSize]="20">
            </app-data-table>
        </div>
    </div>

</div>

<!-- Drawer: Crear / Editar Promoción -->
<app-drawer
    [isOpen]="showModal()"
    [title]="editMode() ? 'Editar Promoción' : 'Nueva Promoción'"
    size="lg"
    side="right"
    (closed)="cerrarModal()">

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <app-admin-form-layout [errorMessage]="submitError()" [stickyActions]="true">

            <!-- Sección: Información -->
            <app-admin-form-section title="Información" [columns]="1">
                <app-form-field label="Nombre" [required]="true" [error]="err('nombre')">
                    <input formControlName="nombre" type="text"
                           class="form-input"
                           placeholder="Ej: Descuento verano 20%" />
                </app-form-field>
                <app-form-field label="Descripción" [error]="err('descripcion')">
                    <textarea formControlName="descripcion"
                              class="form-input" rows="2"
                              placeholder="Descripción breve de la promoción..."></textarea>
                </app-form-field>
            </app-admin-form-section>

            <!-- Sección: Configuración del descuento -->
            <app-admin-form-section title="Configuración del Descuento" [columns]="2">
                <app-form-field label="Tipo de Descuento" [required]="true" [error]="err('tipo')">
                    <select formControlName="tipo" class="form-input">
                        @for (opt of tipoOptions(); track opt.value) {
                            <option [value]="opt.value">{{ opt.label }}</option>
                        }
                    </select>
                </app-form-field>
                <app-form-field [label]="valorLabel()" [required]="true" [error]="err('valor')">
                    <input formControlName="valor" type="number"
                           class="form-input" min="0"
                           [step]="form.controls.tipo.value === 'PORCENTAJE' ? 1 : 0.01"
                           [max]="form.controls.tipo.value === 'PORCENTAJE' ? 100 : null"
                           placeholder="0" />
                </app-form-field>
                <app-form-field label="Alcance" [error]="err('alcance')">
                    <select formControlName="alcance" class="form-input">
                        @for (opt of alcanceOptions(); track opt.value) {
                            <option [value]="opt.value">{{ opt.label }}</option>
                        }
                    </select>
                </app-form-field>
            </app-admin-form-section>

            <!-- Sección: Vigencia -->
            <app-admin-form-section title="Vigencia" [columns]="2">
                <app-date-input
                    formControlName="fechaInicio"
                    label="Fecha Inicio"
                    [required]="true">
                </app-date-input>
                <app-date-input
                    formControlName="fechaFin"
                    label="Fecha Fin"
                    [required]="true"
                    [minDate]="form.controls.fechaInicio.value ?? ''">
                </app-date-input>
            </app-admin-form-section>

            <!-- Sección: Otros -->
            <app-admin-form-section title="Otros" [columns]="1">
                <app-form-field label="Código Cupón" [error]="err('codigoCupon')">
                    <input formControlName="codigoCupon" type="text"
                           class="form-input"
                           placeholder="Ej: VERANO25" />
                </app-form-field>
                <app-form-field label="Límite de Usos" [error]="err('limiteUsos')">
                    <input formControlName="limiteUsos" type="number"
                           class="form-input" min="1"
                           placeholder="Sin límite" />
                </app-form-field>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="promoActivo" formControlName="activo"
                           class="w-4 h-4 accent-[var(--color-primary)]" />
                    <label for="promoActivo" class="input-label" style="margin:0">
                        Promoción activa al guardar
                    </label>
                </div>
            </app-admin-form-section>

            <div slot="actions">
                <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary"
                        [disabled]="guardando() || form.invalid">
                    @if (guardando()) { Guardando... } @else { Guardar Promoción }
                </button>
            </div>

        </app-admin-form-layout>
    </form>

</app-drawer>
