<div class="companies-page">
    <app-page-header
        title="Gestión de Empresas"
        subtitle="Administra las empresas del sistema"
        [breadcrumbs]="breadcrumbs">
        <div actions>
            <app-button label="Nueva Empresa" icon="plus" variant="primary" (click)="openCreateModal()" />
        </div>
    </app-page-header>

    <!-- Filters -->
    <div class="filters-section">
        <div class="search-box">
            <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" class="search-input" placeholder="Buscar por nombre o RUC..." [value]="searchQuery()"
                (input)="onSearch($event)" />
        </div>

        <div class="filter-group">
            <label for="activeFilter">Estado:</label>
            <select id="activeFilter" (change)="onActiveFilterChange($event)"
                [value]="filterActive() === null ? '' : filterActive()">
                <option value="">Todos</option>
                <option value="true">Activos</option>
                <option value="false">Inactivos</option>
            </select>
        </div>

        <div class="results-count">
            Mostrando {{ filteredCount() }} de {{ totalCompanies() }} empresas
        </div>
    </div>

    @if (error()) {
        <app-alert
            type="error"
            [message]="error()!"
            [dismissible]="true"
            (dismiss)="error.set(null)">
        </app-alert>
    }

    <app-data-table
        [data]="companies()"
        [columns]="columns"
        [actions]="actions"
        [loading]="loading()">
    </app-data-table>

    <app-drawer
        [isOpen]="showModal()"
        [title]="editMode() ? 'Editar Empresa' : 'Nueva Empresa'"
        size="lg"
        side="right"
        [hasFooter]="true"
        (closed)="closeModal()">

        <form [formGroup]="companyForm" (ngSubmit)="onSubmit()">
            <app-admin-form-layout [errorMessage]="submitError() ?? ''">

                <!-- Sección: Datos Principales -->
                <app-admin-form-section title="Datos Principales" [columns]="1">
                    <app-form-field
                        label="Nombre Comercial"
                        [control]="getControl('name')"
                        type="text"
                        placeholder="Ej: Empresa ABC S.A.C."
                        [required]="true">
                    </app-form-field>

                    <app-form-field
                        label="Razón Social"
                        [control]="getControl('legalName')"
                        type="text"
                        placeholder="Ej: EMPRESA ABC SOCIEDAD ANÓNIMA CERRADA">
                    </app-form-field>
                </app-admin-form-section>

                <!-- Sección: RUC / Tax Info -->
                <app-admin-form-section title="RUC / Identificación Fiscal" [columns]="1">
                    <app-form-field
                        label="RUC"
                        [control]="getControl('ruc')"
                        type="text"
                        placeholder="Ej: 20123456789"
                        hint="11 dígitos numéricos"
                        [required]="true">
                    </app-form-field>
                </app-admin-form-section>

                <!-- Sección: Contacto -->
                <app-admin-form-section title="Contacto" [columns]="2">
                    <app-form-field
                        label="Dirección Fiscal"
                        [control]="getControl('address')"
                        type="text"
                        placeholder="Ej: Av. Javier Prado 1234, San Isidro, Lima">
                    </app-form-field>

                    <app-form-field
                        label="Email"
                        [control]="getControl('email')"
                        type="email"
                        placeholder="Ej: contacto@empresa.pe">
                    </app-form-field>

                    <app-form-field
                        label="Teléfono"
                        [control]="getControl('phone')"
                        type="text"
                        placeholder="Ej: 01-6123456">
                    </app-form-field>
                </app-admin-form-section>

                <!-- Sección: Configuración -->
                <app-admin-form-section title="Configuración" [columns]="2">
                    <app-form-field
                        label="Logo URL"
                        [control]="getControl('logoUrl')"
                        type="text"
                        placeholder="Ej: https://cdn.empresa.pe/logo.png">
                    </app-form-field>

                    <app-form-field
                        label="Dominio"
                        [control]="getControl('domain')"
                        type="text"
                        placeholder="Ej: empresa.microshop.pe"
                        hint="Dominio personalizado del tenant">
                    </app-form-field>
                </app-admin-form-section>

                <!-- Sección: Estado -->
                <app-admin-form-section title="Estado" [columns]="1">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" formControlName="active" class="checkbox-input" />
                            <span>Empresa activa</span>
                        </label>
                        <small class="form-hint">Las empresas inactivas no aparecerán en los selectores</small>
                    </div>
                </app-admin-form-section>

            </app-admin-form-layout>
        </form>

        <div slot="footer">
            <app-button label="Cancelar" icon="x" variant="secondary" (click)="closeModal()" [disabled]="submitting()" />
            <app-button
                [label]="editMode() ? 'Actualizar Empresa' : 'Crear Empresa'"
                icon="save"
                variant="primary"
                (click)="onSubmit()"
                [disabled]="submitting() || companyForm.invalid"
                [loading]="submitting()" />
        </div>
    </app-drawer>
</div>
