<div class="page-container">

    <!-- Cabecera de página — patrón estándar -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Gestión de Usuarios</h1>
            <p class="page-subtitle">Administra los usuarios del sistema</p>
        </div>
        <button class="btn btn-primary" (click)="openCreateModal()" aria-label="Crear nuevo usuario">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Nuevo Usuario
        </button>
    </div>

    @if (error()) {
    <div class="alert alert-error mb-6" role="alert">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {{ error() }}
    </div>
    }

    @if (loading()) {
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Cargando usuarios…</p>
    </div>
    }

    <!-- User List Component -->
    @if (!loading()) {
    <app-user-list [users]="users()" [totalElements]="totalElements()" [totalPages]="totalPages()"
        [currentPage]="currentPage()" [pageSize]="pageSize()" [searchQuery]="searchQuery()"
        (search)="searchQuery.set($event); currentPage.set(0); loadUsers()"
        (pageSizeChange)="pageSize.set($event); currentPage.set(0); loadUsers()" (pageChange)="onPageChange($event)"
        (edit)="openEditModal($event)" (delete)="onDelete($event)">
    </app-user-list>
    }

    <!-- User Form Component (Modal) -->
    @if (showModal()) {
    <app-user-form [formGroup]="userForm" [roles]="roles()" [editMode]="editMode()" [submitting]="submitting()"
        [submitError]="submitError()" (save)="onSubmit()" (cancel)="closeModal()">
    </app-user-form>
    }
</div>
