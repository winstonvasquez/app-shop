<div class="page-container">

    <!-- Cabecera -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Gestión de Clientes</h1>
            <p class="page-subtitle">Administra los usuarios y clientes del sistema</p>
        </div>
        <button class="btn btn-primary" (click)="openCreateModal()" aria-label="Crear nuevo cliente">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Nuevo Cliente
        </button>
    </div>

    <!-- Alerta de error -->
    @if (error()) {
    <div class="alert alert-error mb-4" role="alert">{{ error() }}</div>
    }

    <!-- Barra de filtros -->
    <div class="filters-bar">
        <div class="search-box">
            <svg class="search-box-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" placeholder="Buscar por nombre, email o documento..."
                [value]="searchQuery()"
                (input)="onSearch($any($event.target).value)" />
        </div>
    </div>

    <!-- Loading -->
    @if (loading()) {
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Cargando clientes…</p>
    </div>
    }

    <!-- Tabla de usuarios -->
    @if (!loading()) {
    <app-user-list
        [users]="users()"
        (edit)="openEditModal($event)"
        (delete)="onDelete($event)">
    </app-user-list>

    <!-- Paginación estándar -->
    <app-pagination
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [totalElements]="totalElements()"
        [pageSize]="pageSize()"
        (pageChange)="onPaginationChange($event)">
    </app-pagination>
    }

    <!-- Formulario en Drawer -->
    <app-user-form
        [formGroup]="userForm"
        [roles]="roles()"
        [editMode]="editMode()"
        [submitting]="submitting()"
        [submitError]="submitError()"
        [isOpen]="showDrawer()"
        (save)="onSubmit()"
        (cancel)="closeModal()">
    </app-user-form>

</div>
