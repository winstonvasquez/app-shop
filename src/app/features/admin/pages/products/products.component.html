<div class="products-page">
    <!-- Page Header -->
    <app-page-header
        title="Gestión de Productos"
        subtitle="Administra el catálogo de productos de tu tienda"
        [breadcrumbs]="breadcrumbs">
        <div actions>
            <app-button label="Nuevo Producto" icon="plus" variant="primary" (click)="openCreateModal()" />
        </div>
    </app-page-header>

    <!-- Search and Filters -->
    <div class="filters-section">
        <div class="search-box">
            <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" class="search-input" placeholder="Buscar productos..." [value]="searchQuery()"
                (input)="onSearch($event)" />
        </div>

        <div class="page-size-selector">
            <label for="pageSize">Mostrar:</label>
            <select id="pageSize" (change)="onPageSizeChange($event)" [value]="pageSize()">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>

    <!-- Error Message -->
    @if (error()) {
        <app-alert
            type="error"
            [message]="error()!"
            [dismissible]="true"
            (dismiss)="error.set(null)">
        </app-alert>
    }

    <!-- Data Table with all states -->
    <app-data-table
        [data]="products()"
        [columns]="columns"
        [actions]="actions"
        [loading]="loading()"
        [currentPage]="currentPage()"
        [pageSize]="pageSize()"
        [totalElements]="totalElements()"
        [totalPages]="totalPages()"
        [sortField]="sortField()"
        [sortDirection]="sortDirection()"
        (pageChange)="onPageChange($event)"
        (sortChange)="onSort($event)">
    </app-data-table>

    <!-- Drawer for Create/Edit Product -->
    <app-drawer
        [isOpen]="showModal()"
        [title]="editMode() ? 'Editar Producto' : 'Nuevo Producto'"
        size="lg"
        side="right"
        [hasFooter]="true"
        (closed)="closeModal()">

        <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
            @if (submitError()) {
                <app-alert
                    type="error"
                    [message]="submitError()!"
                    [dismissible]="true"
                    (dismiss)="submitError.set(null)">
                </app-alert>
            }

            <app-form-field
                label="Nombre"
                [control]="getControl('nombre')"
                type="text"
                placeholder="Ej: Laptop HP 15"
                [required]="true">
            </app-form-field>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea
                    id="descripcion"
                    formControlName="descripcion"
                    class="form-input"
                    rows="3"
                    placeholder="Descripción detallada del producto">
                </textarea>
            </div>

            <app-form-field
                label="Precio Base"
                [control]="getControl('precioBase')"
                type="number"
                placeholder="0.00"
                hint="Precio en dólares"
                [required]="true">
            </app-form-field>

            <app-form-field
                label="Marca"
                [control]="getControl('marca')"
                type="text"
                placeholder="Ej: HP, Dell, Samsung">
            </app-form-field>

            <app-form-field
                label="ID de Empresa"
                [control]="getControl('companyId')"
                type="number"
                placeholder="1"
                hint="Nota: Esto será un selector de empresas en la versión final"
                [required]="true">
            </app-form-field>
        </form>

        <div slot="footer">
            <app-button label="Cancelar" icon="x" variant="secondary" (click)="closeModal()" [disabled]="submitting()" />
            <app-button
                [label]="editMode() ? 'Actualizar Producto' : 'Crear Producto'"
                icon="save"
                variant="primary"
                (click)="onSubmit()"
                [disabled]="submitting() || productForm.invalid"
                [loading]="submitting()" />
        </div>
    </app-drawer>
</div>
