<aside
    class="w-[260px] fixed left-0 top-0 bottom-0 overflow-y-auto z-[100] -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out bg-[var(--color-surface)] border-r border-[var(--color-border)]">
    <div class="p-6 border-b border-[var(--color-border)]">
        <div class="flex items-center gap-2 text-2xl font-bold">
            <div
                class="w-8 h-8 bg-[var(--color-primary)] rounded-lg flex items-center justify-center text-white font-extrabold">
                S</div>
            <span class="text-[var(--color-text-primary)]">Shop<span class="text-[var(--color-primary)]">Admin</span></span>
        </div>
    </div>

    <nav class="py-4 px-3">
        @for (group of navGroups; track group.title) {
        <div class="mb-6">
            <div class="text-xs font-semibold uppercase tracking-wider px-3 py-2 mb-1 text-[var(--color-text-muted)]">
                {{ group.title }}</div>
            @for (item of group.items; track item.route) {
            <a [routerLink]="item.route" routerLinkActive="!bg-[var(--color-primary)] !text-white !opacity-100"
                class="flex items-center gap-3 px-3 py-3 mb-1 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-[var(--color-surface-raised)] focus-visible:ring-2 focus-visible:ring-[var(--color-primary)] focus-visible:ring-offset-2 opacity-80 text-[var(--color-text-primary)]"
                [attr.aria-label]="item.label">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        [attr.d]="getIconPath(item.icon)" />
                </svg>
                <span>{{ item.label }}</span>
            </a>
            }
        </div>
        }
    </nav>
</aside>
