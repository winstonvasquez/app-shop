<header class="header">

    <!-- Búsqueda global -->
    <div class="header-search">
        <div class="search-box">
            <span class="search-box-icon">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" />
                </svg>
            </span>
            <input type="search" placeholder="Buscar en el sistema..." (input)="onSearch($event)" />
        </div>
    </div>

    <div class="header-actions">
        <!-- btn-migration: SKIP — icon-button es custom mobile UI sin clase btn-* -->
        <button class="icon-button" (click)="onNotificationClick()" aria-label="Notificaciones">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            @if (hasNotifications()) {
            <span class="notification-badge"></span>
            }
        </button>

        <!-- User menu con dropdown -->
        <div class="relative">
            <div class="user-menu" (click)="toggleUserMenu()">
                <div class="user-avatar">{{ userName().charAt(0) }}</div>
                <div class="user-info">
                    <div class="user-name">{{ userName() }}</div>
                    <div class="user-role">{{ userRole() }}</div>
                </div>
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    class="transition-transform duration-200" [class.rotate-180]="isUserMenuOpen()">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </div>

            @if (isUserMenuOpen()) {
            <!-- Backdrop -->
            <div class="fixed inset-0 z-40" (click)="closeUserMenu()"></div>

            <!-- Dropdown -->
            <div
                class="absolute right-0 top-full mt-2 w-48 z-50 rounded-xl border border-[var(--color-border)] bg-[var(--color-surface-raised)] shadow-xl overflow-hidden">
                <div class="px-4 py-3 border-b border-[var(--color-border)]">
                    <p class="text-xs font-semibold text-[var(--color-text-primary)] truncate">{{ userName() }}</p>
                    <p class="text-xs text-[var(--color-text-muted)] truncate">{{ userRole() }}</p>
                </div>
                <!-- btn-migration: SKIP — custom link-style danger con bg-[var(--color-danger)]/10, no btn-* -->
                <button (click)="logout()"
                    class="flex items-center gap-3 w-full px-4 py-2.5 text-sm font-semibold text-[var(--color-danger)] hover:bg-[var(--color-danger)]/10 active:bg-[var(--color-danger)]/15 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                    <span>Cerrar sesión</span>
                </button>
            </div>
            }
        </div>
    </div>
</header>
