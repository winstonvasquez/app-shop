<header class="header">
    <div class="search-bar">
        <input type="text" class="search-input" placeholder="Buscar productos, pedidos, clientes..."
            [value]="searchQuery()" (input)="onSearch($event)">
    </div>

    <div class="header-actions">
        <button class="icon-button" (click)="onNotificationClick()" aria-label="Notificaciones">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            @if (hasNotifications()) {
            <span class="notification-badge"></span>
            }
        </button>

        <div class="user-menu" (click)="onUserMenuClick()">
            <div class="user-avatar">{{ userName().charAt(0) }}</div>
            <div class="user-info">
                <div class="user-name">{{ userName() }}</div>
                <div class="user-role">{{ userRole() }}</div>
            </div>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </div>
    </div>
</header>
