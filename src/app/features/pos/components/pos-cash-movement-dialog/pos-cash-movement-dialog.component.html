<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" (click)="onCancel()">
    <div class="bg-[var(--color-surface)] rounded-xl border border-[var(--color-border)] p-6 w-full max-w-sm shadow-xl"
        (click)="$event.stopPropagation()">
        <h3 class="text-lg font-bold text-on mb-4">Movimiento de Caja</h3>

        <!-- Tipo -->
        <div class="flex gap-2 mb-4">
            <button class="flex-1 py-2 rounded-lg font-semibold text-sm transition-colors"
                [class]="tipo() === 'INGRESO' ? 'bg-[var(--color-success)] text-white' : 'bg-[var(--color-surface-raised)] text-muted border border-[var(--color-border)]'"
                (click)="tipo.set('INGRESO')">
                Ingreso
            </button>
            <button class="flex-1 py-2 rounded-lg font-semibold text-sm transition-colors"
                [class]="tipo() === 'RETIRO' ? 'bg-[var(--color-error)] text-white' : 'bg-[var(--color-surface-raised)] text-muted border border-[var(--color-border)]'"
                (click)="tipo.set('RETIRO')">
                Retiro
            </button>
        </div>

        <!-- Monto -->
        <label class="block text-xs font-semibold text-subtle mb-1">Monto (S/)</label>
        <input type="number" min="0.01" step="0.01" class="input-field mb-3 text-lg font-bold text-center"
            [value]="monto()" (input)="monto.set(+$any($event.target).value)">

        <!-- Motivo -->
        <label class="block text-xs font-semibold text-subtle mb-1">Motivo</label>
        <input type="text" class="input-field mb-4" placeholder="Ej: Cambio de billetes, depósito banco..."
            [value]="motivo()" (input)="motivo.set($any($event.target).value)">

        <!-- Actions -->
        <div class="flex gap-2">
            <button class="btn-secondary flex-1" (click)="onCancel()">Cancelar</button>
            <button class="btn-primary flex-1" [disabled]="!isValid()" (click)="onConfirm()">Registrar</button>
        </div>
    </div>
</div>
