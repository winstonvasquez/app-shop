<section class="fav-grid-wrap">

    @if (favoritos().length === 0 && !isLoading()) {
    <div class="fav-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"
            class="opacity-30">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
        </svg>
        <p class="text-sm text-muted">Sin favoritos configurados</p>
        <p class="text-xs text-subtle">Agrega productos desde el catálogo con clic largo</p>
    </div>
    }

    @if (isLoading()) {
    <div class="fav-grid">
        @for (n of [1,2,3,4,5,6,7,8]; track n) {
        <div class="fav-skeleton animate-shimmer"></div>
        }
    </div>
    } @else {
    <div class="fav-grid">
        @for (fav of favoritos(); track fav.id) {
        <button class="fav-tile" [style.--fav-accent]="fav.color ?? 'var(--color-primary)'"
            [class.fav-tile--no-stock]="fav.stockActual <= 0" [disabled]="fav.stockActual <= 0"
            (click)="onSelect(fav)" (contextmenu)="onContextMenu($event, fav)"
            [title]="fav.stockActual <= 0 ? 'Sin stock' : fav.nombre">
            <span class="fav-tile-accent"></span>
            <span class="fav-tile-initial"
                [style.background]="fav.color ?? 'var(--color-primary)'">{{ fav.nombre[0] }}</span>
            <span class="fav-tile-name">{{ fav.nombre }}</span>
            <span class="fav-tile-price">
                <span class="text-[10px] text-subtle">S/</span>{{ fmt(fav.precioFinal) }}
            </span>
            <span class="fav-tile-stock" [class.fav-tile-stock--low]="fav.stockActual <= 3">
                {{ fav.stockActual }}u
            </span>
        </button>
        }
    </div>
    }

    <!-- Context menu for edit/delete -->
    @if (contextMenuFav()) {
    <div class="fav-context-overlay" (click)="closeContextMenu()"></div>
    <div class="fav-context-menu" [style.top.px]="contextMenuY()" [style.left.px]="contextMenuX()">
        <button class="fav-context-item" (click)="removeFavorito()">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                <path fill-rule="evenodd"
                    d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
            </svg>
            Quitar de favoritos
        </button>
    </div>
    }

</section>
