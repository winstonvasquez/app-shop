<app-page-header
    [title]="editMode() ? 'Editar Proveedor' : 'Nuevo Proveedor'"
    [breadcrumbs]="breadcrumbs"
/>

<div class="page-container">
    @if (loading()) {
        <app-loading-spinner />
    } @else {
        @if (error()) {
            <app-alert type="error" [message]="error()!" />
        }

        <div class="card">
            <div class="card-body">
                <form [formGroup]="proveedorForm" (ngSubmit)="onSubmit()" novalidate>

                    @if (submitError()) {
                        <app-alert type="error" [message]="submitError()!" class="mb-4" />
                    }

                    <h3 class="card-title mb-4">Información Fiscal</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <app-form-field label="RUC" [required]="true" [control]="getControl('ruc')">
                            <input class="form-input" formControlName="ruc" maxlength="11"
                                placeholder="Ej. 20123456789" />
                        </app-form-field>

                        <app-form-field label="Razón Social" [required]="true" [control]="getControl('razonSocial')">
                            <input class="form-input" formControlName="razonSocial" maxlength="200" />
                        </app-form-field>

                        <app-form-field label="Nombre Comercial" [control]="getControl('nombreComercial')">
                            <input class="form-input" formControlName="nombreComercial" maxlength="200" />
                        </app-form-field>

                        <app-form-field label="Condición SUNAT" [control]="getControl('condicionSunat')">
                            <select class="form-input" formControlName="condicionSunat">
                                <option value="HABIDO">Habido</option>
                                <option value="NO_HABIDO">No Habido</option>
                                <option value="NO_HALLADO">No Hallado</option>
                            </select>
                        </app-form-field>

                        <app-form-field label="Domicilio Fiscal" [control]="getControl('domicilioFiscal')" class="md:col-span-2">
                            <input class="form-input" formControlName="domicilioFiscal" />
                        </app-form-field>
                    </div>

                    <h3 class="card-title mb-4">Contacto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <app-form-field label="Nombre Contacto" [control]="getControl('contactoNombre')">
                            <input class="form-input" formControlName="contactoNombre" />
                        </app-form-field>

                        <app-form-field label="Teléfono" [control]="getControl('contactoTelefono')">
                            <input class="form-input" formControlName="contactoTelefono" />
                        </app-form-field>

                        <app-form-field label="Email" [control]="getControl('contactoEmail')">
                            <input class="form-input" type="email" formControlName="contactoEmail" />
                        </app-form-field>
                    </div>

                    <h3 class="card-title mb-4">Datos Bancarios y Comerciales</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <app-form-field label="Banco" [control]="getControl('banco')">
                            <input class="form-input" formControlName="banco" />
                        </app-form-field>

                        <app-form-field label="Cuenta Bancaria" [control]="getControl('cuentaBanco')">
                            <input class="form-input" formControlName="cuentaBanco" />
                        </app-form-field>

                        <app-form-field label="Condición de Pago" [control]="getControl('condicionPago')">
                            <select class="form-input" formControlName="condicionPago">
                                <option value="CONTADO">Contado</option>
                                <option value="CREDITO_15">Crédito 15 días</option>
                                <option value="CREDITO_30">Crédito 30 días</option>
                                <option value="CREDITO_60">Crédito 60 días</option>
                                <option value="CREDITO_90">Crédito 90 días</option>
                            </select>
                        </app-form-field>

                        <app-form-field label="Moneda Preferida" [control]="getControl('monedaPreferida')">
                            <select class="form-input" formControlName="monedaPreferida">
                                <option value="PEN">Soles (PEN)</option>
                                <option value="USD">Dólares (USD)</option>
                            </select>
                        </app-form-field>
                    </div>

                    <div class="flex gap-3 justify-end">
                        <app-button
                            label="Cancelar"
                            variant="secondary"
                            icon="x"
                            type="button"
                            [disabled]="submitting()"
                            (click)="onCancel()" />
                        <app-button
                            [label]="editMode() ? 'Actualizar' : 'Crear Proveedor'"
                            variant="primary"
                            icon="save"
                            type="submit"
                            [loading]="submitting()" />
                    </div>
                </form>
            </div>
        </div>
    }
</div>
