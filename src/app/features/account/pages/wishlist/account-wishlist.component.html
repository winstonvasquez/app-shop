<ds-account-shell title="Mis favoritos" subtitle="Productos guardados para más tarde" [userName]="userName()">

    @if (loading()) {
        <div class="state"><span class="spinner"></span> Cargando…</div>
    } @else if (items().length === 0) {
        <div class="empty">
            <lucide-icon name="heart" [size]="48"/>
            <h3>Sin favoritos por ahora</h3>
            <p>Agrega productos a tu lista para encontrarlos rápido.</p>
            <ds-button variant="primary" size="md" routerLink="/products">Explorar productos</ds-button>
        </div>
    } @else {
        <div class="grid">
            @for (it of items(); track it.productoId) {
                <article class="item">
                    <a class="thumb" [routerLink]="['/products', it.productoId]">
                        @if (it.productoImagen) {
                            <img [src]="it.productoImagen" [alt]="it.productoNombre"/>
                        } @else {
                            <div class="placeholder">
                                <lucide-icon name="package" [size]="32"/>
                            </div>
                        }
                    </a>
                    <div class="body">
                        <a class="name" [routerLink]="['/products', it.productoId]">{{ it.productoNombre }}</a>
                        <ds-price [now]="it.precioBase" size="md"/>
                        <div class="actions">
                            <ds-button variant="primary" size="sm" icon="shopping-cart"
                                [disabled]="addingToCart() === it.productoId"
                                (click)="addToCart(it)">
                                Agregar
                            </ds-button>
                            <ds-button variant="ghost" size="sm" icon="heart-off"
                                [disabled]="removing() === it.productoId"
                                (click)="remove(it.productoId)">
                                Quitar
                            </ds-button>
                        </div>
                    </div>
                </article>
            }
        </div>
    }

</ds-account-shell>

<style>
    .state, .empty {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--r-lg);
        padding: 48px 24px; text-align: center; color: var(--c-muted);
        display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .empty { gap: 16px; }
    .empty h3 { color: var(--c-text); margin: 0; font-family: var(--f-display); font-size: 18px; }
    .spinner {
        width: 16px; height: 16px;
        border: 2px solid var(--c-surface2);
        border-top-color: var(--c-brand);
        border-radius: 999px;
        animation: spin 800ms linear infinite;
        display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .grid {
        display: grid; gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    .item {
        background: var(--c-surface);
        border: 1px solid var(--c-border);
        border-radius: var(--r-lg);
        overflow: hidden;
        display: flex; flex-direction: column;
        transition: box-shadow 120ms;
    }
    .item:hover { box-shadow: var(--s-md); }
    .thumb {
        display: block;
        aspect-ratio: 1;
        background: var(--c-surface2);
        overflow: hidden;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .placeholder {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        color: var(--c-muted);
    }
    .body {
        padding: 12px;
        display: flex; flex-direction: column; gap: 8px;
        flex: 1;
    }
    .name {
        font-size: 13px; font-weight: 500;
        color: var(--c-text); text-decoration: none;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        overflow: hidden; min-height: 36px;
    }
    .name:hover { color: var(--c-brand); }
    .actions { display: flex; gap: 6px; margin-top: auto; }
    .actions ds-button { flex: 1; }
</style>
