<div class="page-container">
    <app-breadcrumb [items]="breadcrumbItems" />
    <div class="page-header">
        <h1 class="page-title">Mi Perfil</h1>
        <p class="page-subtitle">Actualiza tus datos personales</p>
    </div>

    @if (loading()) {
        <div class="loading-container"><div class="spinner"></div></div>
    } @else {
        <div class="card max-w-lg">
            <div class="card-body">
                @if (successMsg()) {
                    <div class="badge badge-success mb-4 w-full text-sm py-2 px-3">{{ successMsg() }}</div>
                }
                @if (errorMsg()) {
                    <div class="badge badge-error mb-4 w-full text-sm py-2 px-3">{{ errorMsg() }}</div>
                }
                <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="input-label">Nombres</label>
                            <input class="input-field" type="text" formControlName="nombres" placeholder="Nombres">
                        </div>
                        <div class="flex-1">
                            <label class="input-label">Apellidos</label>
                            <input class="input-field" type="text" formControlName="apellidos" placeholder="Apellidos">
                        </div>
                    </div>
                    <div>
                        <label class="input-label">Correo electrónico</label>
                        <input class="input-field opacity-60" type="email" formControlName="email" readonly>
                        <p class="input-hint">El correo no puede cambiarse desde aquí.</p>
                    </div>
                    <div>
                        <label class="input-label">Teléfono</label>
                        <input class="input-field" type="tel" formControlName="telefono" placeholder="Ej: 999 999 999">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="input-label">Tipo de documento</label>
                            <select class="input-field" formControlName="tipoDocumento">
                                <option value="DNI">DNI</option>
                                <option value="CE">Carnet de Extranjería</option>
                                <option value="PASAPORTE">Pasaporte</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="input-label">N° Documento</label>
                            <input class="input-field" type="text" formControlName="numeroDocumento" placeholder="12345678">
                        </div>
                    </div>
                    <div>
                        <label class="input-label">Fecha de nacimiento</label>
                        <input class="input-field" type="date" formControlName="fechaNacimiento">
                    </div>
                    <button type="submit" class="btn btn-primary" [disabled]="saving() || profileForm.invalid">
                        @if (saving()) { Guardando... } @else { Guardar cambios }
                    </button>
                </form>
            </div>
        </div>
    }
</div>
