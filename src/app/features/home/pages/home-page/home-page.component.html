<div>
    <!-- ════════════════════════════════════════════════
    HERO SLIDER — full bleed
    ════════════════════════════════════════════════ -->
    @if (carouselBanners().length > 0) {
    <div class="px-[4%]">
        <app-promo-banner [banners]="carouselBanners()" />
    </div>
    }

    <div class="max-w-[1850px] mx-auto w-full">

        <!-- ════════════════════════════════════════════════
        PRODUCT STRIP — flota sobre el slider
        ════════════════════════════════════════════════ -->
        <div class="relative z-20 -mt-[133px] px-[5%]">
            <app-flash-deals-section />
        </div>

        <!-- ════════════════════════════════════════════════
        CATEGORY PILLS — filtro interactivo
        ════════════════════════════════════════════════ -->
        @if (categories().length > 0) {
        <section class="px-6 py-10">

            <!-- Encabezado de sección -->
            <div class="text-center mb-5">
                <div class="inline-flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-[0.15em]
                            px-4 py-1.5 rounded-full
                            bg-primary/15 text-primary border border-primary/20 mb-2">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    <span>{{ 'home.exploreInterests' | translate }}</span>
                </div>
            </div>

            <!-- Pills con flex-wrap -->
            <div class="flex flex-wrap gap-2 justify-center">

                <!-- Pill "Todos" -->
                <button (click)="clearCategory()"
                    class="px-4 py-1.5 rounded-full text-[12px] font-semibold transition-all duration-200
                           active:scale-95 cursor-pointer border"
                    [attr.aria-pressed]="searchService.categoryId() === null ? 'true' : 'false'"
                    [class.bg-primary]="searchService.categoryId() === null"
                    [class.text-white]="searchService.categoryId() === null"
                    [class.border-primary]="searchService.categoryId() === null"
                    [class.shadow-md]="searchService.categoryId() === null"
                    [class.bg-surface]="searchService.categoryId() !== null"
                    [class.text-on]="searchService.categoryId() !== null"
                    [class.border-border]="searchService.categoryId() !== null"
                    [class.hover:border-primary]="searchService.categoryId() !== null">
                    {{ 'categories.recommended' | translate }}
                </button>

                @for (cat of categories(); track cat.id) {
                <button (click)="selectCategory(cat.id)"
                    class="px-4 py-1.5 rounded-full text-[12px] font-semibold transition-all duration-200
                           active:scale-95 cursor-pointer border"
                    [attr.aria-pressed]="searchService.categoryId() === cat.id ? 'true' : 'false'"
                    [class.bg-primary]="searchService.categoryId() === cat.id"
                    [class.text-white]="searchService.categoryId() === cat.id"
                    [class.border-primary]="searchService.categoryId() === cat.id"
                    [class.shadow-md]="searchService.categoryId() === cat.id"
                    [class.bg-surface]="searchService.categoryId() !== cat.id"
                    [class.text-on]="searchService.categoryId() !== cat.id"
                    [class.border-border]="searchService.categoryId() !== cat.id">
                    {{ cat.nombre }}
                </button>
                }

            </div>
        </section>
        }

        <!-- ════════════════════════════════════════════════
        SHOWCASE SECTIONS — Más vendidos, 5 estrellas, Lo nuevo
        ════════════════════════════════════════════════ -->
        <div class="px-6">
            <app-product-showcase-section
                type="best-sellers"
                [title]="'home.bestSellers' | translate"
                [linkParams]="{sort: 'sales'}" />

            <app-product-showcase-section
                type="top-rated"
                [title]="'home.topRated' | translate"
                [linkParams]="{rating: '5'}" />

            <app-product-showcase-section
                type="new-arrivals"
                [title]="'home.newArrivals' | translate"
                [linkParams]="{new: 'true'}" />
        </div>

    </div>
</div>
