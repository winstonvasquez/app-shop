<div class="page-container">

  <app-page-header
    title="Movimientos de Inventario"
    subtitle="Registra entradas, salidas y ajustes de stock"
    [breadcrumbs]="breadcrumbs">
    <div actions>
      <app-button icon="plus" label="Registrar Movimiento" variant="primary" (click)="openCreate()" />
    </div>
  </app-page-header>

  <!-- Filtros -->
  <div class="filters-bar">
    <div class="filter-field">
      <label class="input-label">Almacén</label>
      <select class="form-input" style="min-width:200px" (change)="onFilterWarehouse($event)">
        <option value="">Todos</option>
        @for (w of warehouses(); track w.id) {
          <option [value]="w.id">{{ w.name }}</option>
        }
      </select>
    </div>

    <div class="filter-field">
      <label class="input-label">Tipo</label>
      <select class="form-input" style="min-width:210px" (change)="onFilterType($event)">
        <option value="">Todos</option>
        @for (t of movementTypes; track t) {
          <option [value]="t">{{ movementTypeLabels[t] }}</option>
        }
      </select>
    </div>

    <div class="filter-field">
      <label class="input-label">Desde</label>
      <input class="form-input" type="date" style="min-width:160px"
             (change)="onFilterDate('from', $event)" />
    </div>

    <div class="filter-field">
      <label class="input-label">Hasta</label>
      <input class="form-input" type="date" style="min-width:160px"
             (change)="onFilterDate('to', $event)" />
    </div>
  </div>

  @if (error()) {
    <app-alert type="error" [message]="error()!" [dismissible]="true" (dismiss)="error.set(null)" />
  }

  <app-data-table
    [data]="movements()"
    [columns]="columns"
    [loading]="loading()"
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [totalElements]="totalElements()"
    [totalPages]="totalPages()"
    (pageChange)="onPageChange($event)">
  </app-data-table>

</div>

<!-- Drawer: Nuevo Movimiento -->
<app-drawer
  [isOpen]="showDrawer()"
  title="Registrar Movimiento"
  size="lg" side="right" [hasFooter]="true"
  (closed)="closeDrawer()">

  <form [formGroup]="form">
    @if (submitError()) {
      <app-alert type="error" [message]="submitError()!" [dismissible]="true"
                 (dismiss)="submitError.set(null)" />
    }

    <div class="drawer-form-grid">
      <div class="col-span-2">
        <label class="input-label">Tipo de Movimiento <span class="text-error">*</span></label>
        <select class="form-input" formControlName="movementType">
          <option value="">Seleccionar...</option>
          @for (t of movementTypes; track t) {
            <option [value]="t">{{ movementTypeLabels[t] }}</option>
          }
        </select>
      </div>

      <div>
        <label class="input-label">Almacén <span class="text-error">*</span></label>
        <select class="form-input" formControlName="warehouseId">
          <option [value]="null">Seleccionar...</option>
          @for (w of warehouses(); track w.id) {
            <option [value]="w.id">{{ w.name }}</option>
          }
        </select>
      </div>

      <app-form-field label="Producto ID" [control]="getCtrl('productId')"
        type="number" placeholder="ID del producto" [required]="true" />

      <app-form-field label="Cantidad" [control]="getCtrl('quantity')"
        type="number" placeholder="0" [required]="true" />

      <app-form-field label="Costo Unitario (S/)" [control]="getCtrl('unitCost')"
        type="number" placeholder="0.00" />

      <div class="col-span-2">
        <app-date-input label="Fecha" formControlName="movementDate" [required]="true" />
      </div>

      <app-form-field label="Motivo" [control]="getCtrl('reason')"
        type="text" placeholder="Motivo del movimiento" />

      <div>
        <label class="input-label">Tipo Referencia</label>
        <select class="form-input" formControlName="referenceType">
          <option value="">Ninguno</option>
          <option value="ORDEN_COMPRA">Orden de Compra</option>
          <option value="PEDIDO_VENTA">Pedido de Venta</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="AJUSTE">Ajuste</option>
        </select>
      </div>

      <app-form-field label="N° Referencia" [control]="getCtrl('referenceNumber')"
        type="text" placeholder="Ej: OC-001" />
    </div>
  </form>

  <div slot="footer">
    <app-button icon="x" label="Cancelar" variant="secondary" (click)="closeDrawer()" />
    <app-button icon="save" label="Registrar Movimiento" variant="primary"
      [loading]="submitting()" [disabled]="form.invalid" (click)="onSubmit()" />
  </div>
</app-drawer>

<style>
.drawer-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.drawer-form-grid .col-span-2 { grid-column: span 2; }
.filter-field { display: flex; flex-direction: column; gap: 4px; }
</style>
