<div class="mt-8 border-t border-[var(--color-border)] pt-6 flex flex-col md:flex-row gap-4 items-center justify-between">
    <div class="flex items-center gap-4">
        <div
            class="w-14 h-14 rounded-full bg-[var(--color-surface-raised)] flex items-center justify-center text-[var(--color-text-muted)] text-xs text-center p-1 border border-[var(--color-border)]">
            {{ seller()?.name || ('productDetail.seller' | translate) }}
        </div>
        <div>
            <h3 class="font-bold text-lg leading-tight text-[var(--color-text-primary)]">{{ seller()?.name }}</h3>
            <div class="flex text-xs text-[var(--color-text-muted)] items-center gap-2 mt-1">
                <span>{{ seller()?.followers || '0' }} {{ 'productDetail.followers' | translate }}</span>
                <span class="text-[var(--color-border)]">|</span>
                <span>{{ seller()?.salesLevel || ('0 ' + ('productDetail.itemsSold' | translate)) }}</span>
                <span class="text-[var(--color-border)]">|</span>
                <span class="text-[var(--color-text-primary)] font-semibold flex items-center gap-0.5">
                    {{ seller()?.rating || '0.0' }}
                    <svg class="w-3 h-3 text-[var(--color-warning)] fill-current" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                        </path>
                    </svg>
                </span>
            </div>
        </div>
    </div>
    <div class="flex gap-2 w-full md:w-auto mt-4 md:mt-0">
        <button
            class="flex-1 md:flex-none px-6 py-2 border border-[var(--color-border)] rounded-full text-sm font-medium text-[var(--color-text-secondary)] hover:bg-[var(--color-surface-raised)] transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            {{ 'productDetail.follow' | translate }}
        </button>
        <button
            class="flex-1 md:flex-none px-6 py-2 border border-[var(--color-border)] rounded-full text-sm font-medium text-[var(--color-text-secondary)] hover:bg-[var(--color-surface-raised)] transition-colors">
            {{ 'productDetail.viewAll' | translate }}
        </button>
    </div>
</div>
