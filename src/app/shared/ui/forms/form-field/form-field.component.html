<div class="form-field">
    <label [for]="id()" class="form-label">
        {{ label() }}
        @if (required()) {
            <span class="required-indicator">*</span>
        }
    </label>

    @if (control()) {
        <!-- Modo 1: auto-render con FormControl -->
        <input
            [id]="id()"
            [type]="type()"
            [formControl]="control()!"
            [placeholder]="placeholder()"
            [attr.disabled]="disabled() ? true : null"
            [class.error]="hasError()"
            class="form-input"
        />
    } @else {
        <!-- Modo 2: content projection — el padre proyecta el <input> o <select> -->
        <ng-content />
    }

    @if (hint() && !hasError()) {
        <p class="form-hint">{{ hint() }}</p>
    }

    @if (hasError()) {
        <p class="form-error">{{ errorMessage() }}</p>
    }
</div>
