<!-- ════════════════════════════════════════════
     PROMO BANNER / HERO SLIDER  — estilo Amazon
     — Cross-fade (opacity): cero riesgo de slides vecinos visibles
     — Imagen full-bleed sin scale, sin slivers
     — CTA blanco sobre fondo oscuro (alto contraste)
     ════════════════════════════════════════════ -->
<section
    class="relative w-full overflow-hidden group bg-black"
    style="height: clamp(220px, 38vw, 480px);"
    (mouseenter)="stopAutoSlide()"
    (mouseleave)="startAutoSlide()">

    <!-- ── Slides apilados (cross-fade) ── -->
    @for (banner of banners(); track banner.id; let i = $index) {
    <div class="absolute inset-0 transition-opacity duration-700 ease-in-out"
         [style.opacity]="currentSlide() === i ? '1' : '0'"
         [style.z-index]="currentSlide() === i ? '1' : '0'">

        <!-- Imagen full-bleed, sin scale -->
        <img [src]="banner.imageUrl" [alt]="banner.title"
            class="absolute inset-0 w-full h-full object-cover object-center select-none">

        <!-- Gradiente izquierdo para legibilidad del texto -->
        <div class="absolute inset-0 bg-gradient-to-r from-black/70 via-black/40 to-transparent"></div>

        <!-- Vignette inferior sutil -->
        <div class="absolute bottom-0 left-0 right-0 h-16
                    bg-gradient-to-t from-black/30 to-transparent"></div>

        <!-- ── Contenido textual ── -->
        <div class="absolute inset-0 flex flex-col justify-center z-10
                    pl-[clamp(20px,7%,96px)] pr-[48%]">

            <!-- Etiqueta pequeña / subtítulo -->
            @if (banner.subtitle) {
            <p class="text-white/75 font-medium uppercase tracking-widest mb-2
                      text-[clamp(0.6rem,1vw,0.75rem)]">
                {{ banner.subtitle }}
            </p>
            }

            <!-- Título principal -->
            <h2 class="text-white font-extrabold leading-[1.05] tracking-tight mb-4 drop-shadow-xl
                       text-[clamp(1.4rem,3.8vw,2.8rem)]">
                {{ banner.title }}
            </h2>

            <!-- CTA — estilo Amazon: botón blanco con texto oscuro — solo si hay ctaUrl destino -->
            @if (banner.ctaText && banner.ctaUrl) {
            <a [routerLink]="banner.ctaUrl"
                class="self-start inline-flex items-center gap-2
                       px-5 py-2 rounded
                       bg-[var(--color-surface)] hover:bg-[var(--color-surface-raised)] active:bg-[var(--color-surface-raised)]
                       text-on font-semibold
                       text-[clamp(0.7rem,1.2vw,0.85rem)]
                       shadow-lg transition-colors duration-150 cursor-pointer no-underline">
                {{ banner.ctaText }}
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            }

        </div>
    </div>
    }

    <!-- ── Flecha izquierda — estilo Amazon ── -->
    <button (click)="previousSlide()" aria-label="Anterior"
        class="absolute left-2 top-1/2 -translate-y-1/2 z-20
               w-9 h-12 rounded-r-sm rounded-l
               bg-black/40 hover:bg-black/65
               backdrop-blur-[2px]
               flex items-center justify-center
               opacity-0 group-hover:opacity-100
               transition-all duration-200 focus:outline-none
               border border-white/10">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor"
            viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
    </button>

    <!-- ── Flecha derecha ── -->
    <button (click)="nextSlide()" aria-label="Siguiente"
        class="absolute right-2 top-1/2 -translate-y-1/2 z-20
               w-9 h-12 rounded-l-sm rounded-r
               bg-black/40 hover:bg-black/65
               backdrop-blur-[2px]
               flex items-center justify-center
               opacity-0 group-hover:opacity-100
               transition-all duration-200 focus:outline-none
               border border-white/10">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor"
            viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
    </button>

    <!-- ── Dots indicadores ── -->
    @if (banners().length > 1) {
    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1.5 z-20">
        @for (banner of banners(); track banner.id; let i = $index) {
        <button (click)="goToSlide(i)"
            class="h-1.5 rounded-full transition-all duration-300 focus:outline-none"
            [style.width]="currentSlide() === i ? '24px' : '6px'"
            [style.background-color]="currentSlide() === i ? 'white' : 'rgba(255,255,255,0.35)'"
            [attr.aria-label]="'Slide ' + (i + 1)">
        </button>
        }
    </div>
    }

</section>
