<div class="max-w-md mx-auto flex flex-col gap-4">
    <p class="text-sm text-[var(--color-text-muted)] text-center">
        Completa tus datos para crear tu cuenta
    </p>

    @if (email) {
    <div class="bg-[var(--color-surface-raised)] rounded-lg p-3 text-center border border-[var(--color-border)]">
        <span class="text-xs text-[var(--color-text-muted)]">Registrando con:</span>
        <p class="font-medium text-[var(--color-text-primary)]">{{ email }}</p>
    </div>
    }

    @if (errorMsg()) {
    <div class="p-3 bg-[color-mix(in_oklch,var(--color-error)_10%,var(--color-surface))] border border-[color-mix(in_oklch,var(--color-error)_30%,transparent)] rounded-lg text-[var(--color-error)] text-xs text-center">
        {{ errorMsg() }}
    </div>
    }

    <div class="flex flex-col gap-3">
        <div class="flex gap-3">
            <div class="flex-1">
                <label class="block text-xs font-medium text-[var(--color-text-secondary)] mb-1">Nombres</label>
                <input type="text" [(ngModel)]="nombres" placeholder="Juan"
                    class="w-full border border-[var(--color-border)] bg-[var(--color-surface-raised)] text-[var(--color-text-primary)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] placeholder:text-[var(--color-text-muted)]" />
            </div>
            <div class="flex-1">
                <label class="block text-xs font-medium text-[var(--color-text-secondary)] mb-1">Apellidos</label>
                <input type="text" [(ngModel)]="apellidos" placeholder="Pérez"
                    class="w-full border border-[var(--color-border)] bg-[var(--color-surface-raised)] text-[var(--color-text-primary)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] placeholder:text-[var(--color-text-muted)]" />
            </div>
        </div>

        <div>
            <label class="block text-xs font-medium text-[var(--color-text-secondary)] mb-1">Tipo de documento</label>
            <select [(ngModel)]="tipoDocumento"
                class="w-full border border-[var(--color-border)] bg-[var(--color-surface-raised)] text-[var(--color-text-primary)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]">
                @for (docType of documentTypes; track docType) {
                <option [value]="docType">{{ docType }}</option>
                }
            </select>
        </div>

        <div>
            <label class="block text-xs font-medium text-[var(--color-text-secondary)] mb-1">Número de documento</label>
            <input type="text" [(ngModel)]="numeroDocumento" [placeholder]="tipoDocumento === 'DNI' ? '12345678' : 'AB1234567'"
                class="w-full border border-[var(--color-border)] bg-[var(--color-surface-raised)] text-[var(--color-text-primary)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] placeholder:text-[var(--color-text-muted)]" />
        </div>

        <div>
            <label class="block text-xs font-medium text-[var(--color-text-secondary)] mb-1">Fecha de nacimiento</label>
            <input type="date" [(ngModel)]="fechaNacimiento"
                class="w-full border border-[var(--color-border)] bg-[var(--color-surface-raised)] text-[var(--color-text-primary)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]" />
        </div>
    </div>

    <button (click)="onSubmit()" [disabled]="!isValid() || loading()"
        class="w-full bg-accent hover:brightness-110 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-full py-3 transition-all text-sm flex items-center justify-center gap-2">
        @if (loading()) {
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
        </svg>
        }
        Crear cuenta
    </button>

    <button (click)="goBack()" class="text-[var(--color-text-muted)] hover:text-[var(--color-text-secondary)] text-xs text-center transition-colors">
        ← Volver
    </button>
</div>
