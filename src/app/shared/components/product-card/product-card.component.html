<article (click)="navigateToDetail()"
    class="card-product group relative cursor-pointer h-full select-none overflow-hidden transition-all duration-300 hover:-translate-y-1"
    style="border-radius: var(--ds-r-lg); box-shadow: var(--ds-shadow-md); background: var(--color-surface); border: 1px solid var(--color-border);">

    <!-- ─── Image Area — with soft surface tint ─── -->
    <div class="relative overflow-hidden m-2 aspect-[1/1] transition-transform duration-500 group-hover:scale-[1.02]"
        style="border-radius: var(--ds-r-md); background: var(--color-surface-raised);">

        <!-- Product image -->
        <img [src]="product().image" [alt]="product().name" class="absolute inset-0 w-full h-full object-contain p-4
                   group-hover:scale-[1.08] transition-transform duration-500 ease-out" loading="lazy" />

        <!-- Discount badge — DS Style -->
        @if (product().discount) {
        <div class="absolute top-2.5 left-2.5 z-10">
            <span class="px-2 py-1 font-bold text-white text-[10px] uppercase tracking-wider"
                  style="border-radius: var(--ds-r-xs); background: var(--color-danger); box-shadow: var(--ds-shadow-sm);">
                {{ product().discount }}
            </span>
        </div>
        }

        <!-- Botón favorito — DS Style -->
        @if (isAuthenticated()) {
        <button (click)="toggleWishlist($event)"
            class="absolute top-2.5 right-2.5 z-10 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-200 shadow-sm"
            [style.background]="isFavorito() ? 'var(--color-primary)' : 'rgba(255,255,255,0.9)'"
            [style.color]="isFavorito() ? '#fff' : 'var(--color-text-secondary)'"
            [style.border]="'1px solid var(--color-border)'">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                [attr.fill]="isFavorito() ? 'currentColor' : 'none'"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        </button>
        }
    </div>

    <!-- ─── Product Info ─── -->
    <div class="flex flex-col flex-grow px-4 pt-1 pb-4 gap-2">

        <!-- Name — DS Force Sans -->
        <p style="font-family: var(--f-sans); font-size: 13px; font-weight: 500; line-height: 1.4;"
            class="line-clamp-2 flex-grow text-[var(--color-text-primary)] group-hover:text-[var(--color-primary)] transition-colors">
            {{ product().name }}
        </p>

        <!-- Price + Add-to-cart row -->
        <div class="flex items-center justify-between gap-1.5 mt-auto">

            <!-- Price -->
            <div class="min-w-0 flex flex-col">
                @if (product().originalPrice && product().originalPrice! > 0) {
                <span class="text-[10px] line-through leading-none text-[var(--color-text-muted)] mb-1">
                    S/ {{ product().originalPrice!.toFixed(2) }}
                </span>
                }
                <span style="font-family: var(--f-sans); font-size: 16px; font-weight: 800; color: var(--color-primary); letter-spacing: -0.02em;">
                    S/ {{ product().price.toFixed(2) }}
                </span>
            </div>

            <button (click)="openQuickview($event)"
                class="w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 shadow-sm"
                style="background: var(--color-surface-raised); color: var(--color-text-primary); border: 1px solid var(--color-border);">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14m-7-7v14" />
                </svg>
            </button>
        </div>
    </div>
</article>
